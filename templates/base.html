<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aplikasi Laporan Akuisisi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; }
    .app-brand { font-weight:600; letter-spacing:0.2px; }
    .content-area { min-height: 60vh; }
    .card.shadow-soft { box-shadow: 0 6px 18px rgba(20,24,28,0.06); border: 0; }
    .table-hover tbody tr:hover { background: rgba(0,0,0,0.02); }
    .badge-status-draft { background:#6c757d; color: #fff; }
    .badge-status-final { background:#198754; color:#fff; }
    .muted-small { font-size:0.85rem; color:#6c757d; }
    .toolbar-search { max-width:420px; }
    @media (min-width: 992px) {
      .main-grid { display:grid; grid-template-columns: 260px 1fr; gap:1.5rem; }
      .sidebar { position:sticky; top:1rem; align-self:start; }
    }
    /* (dark mode removed) */
  </style>
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="{{ url_for('dashboard') }}">
        <i class="bi bi-shield-lock-fill me-2"></i>
        <span class="app-brand">Aplikasi Laporan Akuisisi</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navCollapse">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navCollapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('list_laporan') }}"><i class="bi bi-file-earmark-text me-2"></i>Daftar</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('create_laporan') }}"><i class="bi bi-plus-lg me-2"></i>Buat Laporan</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container mb-5">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="alert alert-{{ category }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
    <script>
      // enable Bootstrap tooltips globally
      document.addEventListener('DOMContentLoaded', function(){
        var tts = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tts.forEach(function (el) { new bootstrap.Tooltip(el); });
        // no theme toggle (dark mode removed)
      });
    </script>
</body>
</html>
